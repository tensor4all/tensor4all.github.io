<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 550" role="img" aria-labelledby="tf-arch-title tf-arch-desc">
  <title id="tf-arch-title">tenferro-rs architecture overview</title>
  <desc id="tf-arch-desc">Four-layer crate stack. tenferro-xla sits as a thin bridge between L3 and L2, lowering GraphProgram to StableHLO and handing off to the external OpenXLA/PJRT runtime beside tenferro-gpu.</desc>
  <defs>
    <marker id="arr" markerWidth="9" markerHeight="7" refX="8" refY="3.5" orient="auto" markerUnits="strokeWidth">
      <path d="M 0 0 L 9 3.5 L 0 7 z" fill="#334155"/>
    </marker>
    <marker id="arr-xla" markerWidth="9" markerHeight="7" refX="8" refY="3.5" orient="auto" markerUnits="strokeWidth">
      <path d="M 0 0 L 9 3.5 L 0 7 z" fill="#b45309"/>
    </marker>
    <style>
      .box  { fill: #f8fafc; stroke: #64748b; stroke-width: 1.5; }
      .fam  { fill: #dbeafe; stroke: #2563eb; stroke-width: 1.5; }
      .xla  { fill: #fff7ed; stroke: #b45309; stroke-width: 1.5; }
      .ext  { fill: #ffffff; stroke: #94a3b8; stroke-width: 1.3; stroke-dasharray: 5 4; }
      .name { font: 700 13px system-ui, sans-serif; fill: #0f172a; text-anchor: middle; }
      .sub  { font: 11px system-ui, sans-serif; fill: #475569; text-anchor: middle; }
      .tag  { font: 700 10px system-ui, sans-serif; fill: #94a3b8; }
      .hdr  { font: 700 11px system-ui, sans-serif; fill: #475569; text-anchor: middle; letter-spacing: 0.4px; }
      .cap  { font: italic 12px system-ui, sans-serif; fill: #334155; text-anchor: middle; }
      .leg  { font: 11px system-ui, sans-serif; fill: #475569; }
      .dep  { stroke: #334155; stroke-width: 1.6; marker-end: url(#arr); fill: none; }
      .use  { stroke: #64748b; stroke-width: 1.2; stroke-dasharray: 4 4; marker-end: url(#arr); fill: none; }
      .gp   { stroke: #b45309; stroke-width: 1.4; stroke-dasharray: 5 3; marker-end: url(#arr-xla); fill: none; }
      .bus  { stroke: #2563eb; stroke-width: 1.6; fill: none; }
      .busa { stroke: #2563eb; stroke-width: 1.6; marker-end: url(#arr); fill: none; }
    </style>
  </defs>

  <rect width="100%" height="100%" fill="#ffffff"/>

  <!-- USER ENTRY POINTS -->
  <text x="460" y="22" class="hdr">USER ENTRY POINTS</text>
  <rect x="260" y="30" width="128" height="52" rx="6" class="box"/>
  <text x="324" y="52" class="name" style="font-size:12px">TypedTensor · Tensor</text>
  <text x="324" y="69" class="sub">no AD</text>
  <rect x="396" y="30" width="128" height="52" rx="6" class="box"/>
  <text x="460" y="52" class="name" style="font-size:12px">EagerTensor</text>
  <text x="460" y="69" class="sub">.backward()</text>
  <rect x="532" y="30" width="128" height="52" rx="6" class="box"/>
  <text x="596" y="52" class="name" style="font-size:12px">TracedTensor</text>
  <text x="596" y="69" class="sub">grad · vjp · jvp</text>

  <line x1="460" y1="84" x2="460" y2="106" class="dep"/>

  <!-- L4 -->
  <rect x="260" y="110" width="400" height="56" rx="6" class="box"/>
  <text x="272" y="126" class="tag">L4</text>
  <text x="460" y="134" class="name">tenferro-ad</text>
  <text x="460" y="152" class="sub">eager + traced autodiff</text>

  <line x1="460" y1="168" x2="460" y2="192" class="dep"/>

  <!-- L3: tenferro-runtime -->
  <rect x="260" y="196" width="400" height="72" rx="6" class="box"/>
  <text x="272" y="212" class="tag">L3</text>
  <text x="460" y="226" class="name">tenferro-runtime</text>
  <text x="460" y="244" class="sub">trace → compile → execute</text>
  <!-- ExtensionOp badge inside runtime -->
  <rect x="556" y="220" width="96" height="22" rx="4" class="fam"/>
  <text x="604" y="235" class="sub" style="font-weight:700;font-size:10px">ExtensionOp</text>

  <!-- tenferro-xla: thin bridge between L3 and L2, shifted right -->
  <rect x="472" y="276" width="188" height="32" rx="4" class="xla"/>
  <text x="566" y="290" class="name" style="font-size:11px;fill:#78350f">tenferro-xla</text>
  <text x="566" y="303" class="sub" style="fill:#92400e;font-size:10px">GraphProgram → StableHLO</text>

  <!-- Arrow from xla bar right edge to OpenXLA -->
  <line x1="660" y1="292" x2="725" y2="320" class="gp"/>

  <!-- dep arrow at x=460, matching all other layer arrows -->
  <line x1="460" y1="270" x2="460" y2="320" class="dep"/>

  <!-- L2 -->
  <rect x="260" y="320" width="125" height="68" rx="6" class="box"/>
  <text x="272" y="336" class="tag">L2</text>
  <text x="322" y="342" class="name" style="font-size:12px">tenferro-tensor</text>
  <text x="322" y="359" class="sub">dense tensors</text>
  <text x="322" y="375" class="sub">backend traits</text>
  <rect x="395" y="320" width="125" height="68" rx="6" class="box"/>
  <text x="457" y="342" class="name" style="font-size:12px">tenferro-cpu</text>
  <text x="457" y="359" class="sub">CPU backend</text>
  <text x="457" y="375" class="sub" style="font-size:9px">faer | BLAS/LAPACK</text>
  <rect x="530" y="320" width="120" height="68" rx="6" class="box"/>
  <text x="590" y="342" class="name" style="font-size:12px">tenferro-gpu</text>
  <text x="590" y="359" class="sub">CubeCL · CUDA</text>
  <text x="590" y="375" class="sub" style="font-size:9px">cuTENSOR/cuSOLVER</text>

  <!-- OpenXLA: external, right of tenferro-gpu -->
  <rect x="660" y="320" width="130" height="68" rx="6" class="ext"/>
  <text x="725" y="342" class="name" style="font-size:12px">OpenXLA</text>
  <text x="725" y="359" class="sub">PJRT plugin</text>
  <text x="725" y="375" class="sub" style="font-size:9px">runtime-loaded</text>

  <line x1="460" y1="390" x2="460" y2="412" class="dep"/>

  <!-- L1 -->
  <rect x="260" y="416" width="400" height="52" rx="6" class="box"/>
  <text x="272" y="432" class="tag">L1</text>
  <text x="460" y="438" class="name">tenferro-tensor-core</text>
  <text x="460" y="456" class="sub">host-only data model · zero deps</text>

  <!-- FOUNDATIONS (width 170) -->
  <text x="105" y="108" class="hdr">FOUNDATIONS</text>
  <rect x="20" y="120" width="170" height="52" rx="6" class="ext"/>
  <text x="105" y="140" class="name">tidu-rs</text>
  <text x="105" y="157" class="sub">linearize · linear_transpose</text>
  <rect x="20" y="196" width="170" height="52" rx="6" class="ext"/>
  <text x="105" y="216" class="name">computegraph-rs</text>
  <text x="105" y="233" class="sub">generic graph engine</text>
  <rect x="20" y="320" width="170" height="52" rx="6" class="ext"/>
  <text x="105" y="340" class="name">strided-rs</text>
  <text x="105" y="357" class="sub">strided views · CPU kernels</text>
  <line x1="192" y1="146" x2="256" y2="146" class="use"/>
  <line x1="192" y1="222" x2="256" y2="222" class="use"/>
  <line x1="192" y1="346" x2="256" y2="346" class="use"/>

  <!-- OPERATION FAMILIES (width 210) -->
  <text x="925" y="102" class="hdr">OPERATION FAMILIES</text>
  <rect x="820" y="110" width="210" height="56" rx="6" class="fam"/>
  <text x="925" y="132" class="name">tenferro-einsum</text>
  <text x="925" y="149" class="sub">contraction trees · AD rule</text>
  <rect x="820" y="182" width="210" height="56" rx="6" class="fam"/>
  <text x="925" y="204" class="name">tenferro-linalg</text>
  <text x="925" y="221" class="sub">svd · qr · solve · AD rules</text>
  <rect x="820" y="254" width="210" height="56" rx="6" class="fam"/>
  <text x="925" y="276" class="name">tenferro-fft</text>
  <text x="925" y="293" class="sub">fft · rfft · irfft</text>
  <rect x="820" y="326" width="210" height="56" rx="6" class="fam"/>
  <text x="925" y="348" class="name">tropical (ext/)</text>
  <text x="925" y="365" class="sub">tropical semiring example</text>
  <rect x="820" y="398" width="210" height="56" rx="6" class="ext"/>
  <text x="925" y="420" class="name">your-crate</text>
  <text x="925" y="437" class="sub">sparse ops? custom algebra?</text>

  <!-- Bus from op families → ExtensionOp in runtime -->
  <line x1="800" y1="138" x2="800" y2="426" class="bus"/>
  <line x1="818" y1="138" x2="800" y2="138" class="bus"/>
  <line x1="818" y1="210" x2="800" y2="210" class="bus"/>
  <line x1="818" y1="282" x2="800" y2="282" class="bus"/>
  <line x1="818" y1="354" x2="800" y2="354" class="bus"/>
  <line x1="818" y1="426" x2="800" y2="426" class="bus"/>
  <line x1="800" y1="231" x2="656" y2="231" class="busa"/>

  <!-- LEGEND -->
  <rect x="260" y="488" width="14" height="14" rx="3" class="box"/>
  <text x="282" y="499" class="leg">workspace crates</text>
  <rect x="400" y="488" width="14" height="14" rx="3" class="fam"/>
  <text x="422" y="499" class="leg">operation families (ExtensionOp)</text>
  <rect x="640" y="488" width="14" height="14" rx="3" class="ext"/>
  <text x="662" y="499" class="leg">external / your code</text>
  <rect x="260" y="506" width="50" height="12" rx="3" class="xla"/>
  <text x="318" y="516" class="leg">tenferro-xla bridge (L2–L3)</text>
  <line x1="490" y1="512" x2="520" y2="512" class="gp"/>
  <text x="528" y="516" class="leg">GraphProgram → StableHLO handoff</text>

  <text x="520" y="542" class="cap">einsum, linalg, and FFT are not built-ins — they register through the same public ExtensionOp interface available to any crate.</text>
</svg>
